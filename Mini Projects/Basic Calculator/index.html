<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .container {
            height: 400px;
            width: 400px;
            border: 2px solid black;
            border-radius: 8px;
            display: flex;
            gap: 28px;
            flex-direction: column;
            align-items: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 0px;
        }

        .container h1 {
            font-size: 28px;
            font-weight: bold;
            margin-top: 24px;
        }

        .container h2 {
            font-size: 24px;
            font-weight: bold;
            margin-top: 18px;
        }

        .fr-value,
        .sc-value {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .fr-value>input,
        .sc-value>input {
            padding: 6px 114px 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .fr-value>label,
        .sc-value>label {
            font-weight: bold;
            font-size: 18px;
        }

        .btn {
            margin-top: 10px;
            display: flex;
            gap: 6px;
        }

        .btn button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        .btn button:hover {
            background-color: #3b98fb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Basic Calculator</h1>
        <div class="fr-value">
            <label for="Num1">First Number:</label>
            <input type="text" id="Num1" placeholder="Enter first value">
        </div>
        <div class="sc-value">
            <label for="Num2">Second Number:</label>
            <input type="text" id="Num2" placeholder="Enter Second value">
        </div>
        <div class="btn">
            <button type="button" onclick="add()">Addition</button>
            <button type="button" onclick="subtract()">Subtraction</button>
            <button type="button" onclick="multiply()">Multiplication</button>
            <button type="button" onclick="divide()">Division</button>
        </div>
        <h2>Output:</h2>
    </div>

    <script>
        function add() {
            var v1 = document.querySelector("#Num1").value;
            var v2 = document.querySelector("#Num2").value;
            var output = document.querySelector("h2");

            if(v1 === "" || v2 === "") {
                alert("Please enter both values.");
                return;
            }
            var sum = Number(v1) + Number(v2);
            output.innerText = "Output: "+ sum;
        }

        function subtract() {
            var v1 = document.querySelector("#Num1").value;
            var v2 = document.querySelector("#Num2").value;
            var output = document.querySelector("h2");

            if(v1 === "" || v2 === "") {
                alert("Please enter both values.");
                return;
            }
            var diff = Number(v1) - Number(v2);
            output.innerText = "Output: "+ diff;
        }

        function multiply() {
            var v1 = document.querySelector("#Num1").value;
            var v2 = document.querySelector("#Num2").value;
            var output = document.querySelector("h2");

            if(v1 === "" || v2 === "") {
                alert("Please enter both values.");
                return;
            }
            var product = Number(v1) * Number(v2);
            output.innerText = "Output: "+ product;
        }

        function divide() {
            var v1 = document.querySelector("#Num1").value;
            var v2 = document.querySelector("#Num2").value;
            var output = document.querySelector("h2");

            if(v1 === "" || v2 === "") {
                alert("Please enter both values.");
                return;
            }

            if (v2 === "0") {
                alert("Cannot divide by zero.");
                return;
            }

            var quotient = Number(v1) / Number(v2);
            output.innerText = "Output: "+ quotient;
        }
    </script>
</body>

</html>
